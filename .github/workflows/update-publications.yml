name: Update publications from Google Scholar

# Refreshes publications.json on a schedule and commits it if anything changed.
on:
  schedule:
    - cron: "0 6 * * 1"      # every Monday at 06:00 UTC
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape Google Scholar
        env:
          # Set this in: repo Settings → Secrets and variables → Actions → Variables
          # (name: SCHOLAR_ID). Falls back to the value hard-coded in the script.
          SCHOLAR_ID: ${{ vars.SCHOLAR_ID }}
          # Scholar blocks CI/datacenter IPs; route through free proxies for a
          # chance of succeeding. If it still fails, the script exits cleanly and
          # keeps the last good publications.json (the build does not fail).
          USE_FREE_PROXIES: "1"
        run: python scrape_publications.py

      - name: Commit changes if publications changed
        run: |
          if [[ -n "$(git status --porcelain publications.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add publications.json
            git commit -m "chore: update publications from Google Scholar"
            git push
          else
            echo "No changes to publications.json."
          fi
